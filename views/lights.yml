type: panel
title: Lights
path: lights
cards:
  - type: custom:button-card
    template:
      - variable_template
      - body_template
    variables:
      lightscardversion: 0.3.0
      var_background: |-
        [[[ 
          try {
            if (hass.states[variables.var_assistsat_entity] &&
                hass.states[variables.var_assistsat_entity].attributes.mode === "night") {
              return "";
            }
            return hass.states[variables.var_assistsat_entity]
              ? hass.states[variables.var_assistsat_entity].attributes.background
              : "";
          } catch (e) {
            return "";
          }
        ]]]
      var_sat_area: |-
        [[[
          const norm = (s) =>
            (s ?? "").toString().trim().toLowerCase()
              .replace(/-/g, "_")
              .replace(/\s+/g, "_");
          return norm(hass.states[variables.var_assistsat_entity]?.attributes?.this_area_id);
        ]]]
      var_remote_area: |-
        [[[
          const norm = (s) =>
            (s ?? "").toString().trim().toLowerCase()
              .replace(/-/g, "_")
              .replace(/\s+/g, "_");
          try {
            const p = new URLSearchParams(window.location.search || "");
            return norm(p.get("area"));
          } catch (e) {
            return "";
          }
        ]]]
      var_is_remote_view: |-
        [[[
          return (
            variables.var_remote_area &&
            variables.var_remote_area !== variables.var_sat_area
          );
        ]]]
      var_display_area: |-
        [[[
          return variables.var_is_remote_view
            ? variables.var_remote_area
            : variables.var_sat_area;
        ]]]
      var_display_area_title: |-
        [[[
          const titleCase = (s) =>
            (s ?? "")
              .toString()
              .replace(/_/g, " ")
              .replace(/\b\w/g, (c) => c.toUpperCase());
          return titleCase(variables.var_display_area);
        ]]]
      var_display_area_icon: |-
        [[[
          const area = variables.var_display_area || "";
          const match = (keywords) => keywords.some(k => area.includes(k));

          if (match(["office","study","desk"])) return "💼";
          if (match(["bedroom","master","bed"])) return "🛏️";
          if (match(["guest"])) return "🛌";
          if (match(["kitchen"])) return "🍳";
          if (match(["living","lounge","sofa"])) return "🛋️";
          if (match(["bath","toilet","wc"])) return "🛁";
          if (match(["dining"])) return "🍽️";
          if (match(["hall","hallway","entry"])) return "🚪";
          if (match(["garage"])) return "🚗";
          if (match(["garden","outside","yard","patio"])) return "🌿";
          if (match(["loft","attic"])) return "🧱";
          if (match(["utility","laundry"])) return "🧺";
          if (match(["downstairs","upstairs"])) return "🏠";
          return "🏠";
        ]]]
      var_lights: |-
        [[[
          try {
            const sat = hass.states[variables.var_assistsat_entity];
            const attrs = sat?.attributes || {};
            const map = attrs.areas_entity_map || {};
            const fallback = attrs.area_entity_list || [];
            const list = (variables.var_is_remote_view && map[variables.var_display_area])
              ? map[variables.var_display_area]
              : fallback;
            const arr = Array.isArray(list) ? list : (typeof list === "string" ? JSON.parse(list) : []);
            return [...new Set(arr)]
              .filter(eid => typeof eid === "string" && eid.startsWith("light."))
              .sort();
          } catch (e) {
            return [];
          }
        ]]]
      var_scenes: |-
        [[[
          try {
            const sat = hass.states[variables.var_assistsat_entity];
            const attrs = sat?.attributes || {};
            const map = attrs.areas_entity_map || {};
            const fallback = attrs.area_entity_list || [];
            const list = (variables.var_is_remote_view && map[variables.var_display_area])
              ? map[variables.var_display_area]
              : fallback;
            const arr = Array.isArray(list) ? list : (typeof list === "string" ? JSON.parse(list) : []);
            return [...new Set(arr)]
              .filter(eid => typeof eid === "string" && eid.startsWith("scene."))
              .sort();
          } catch (e) {
            return [];
          }
        ]]]
    styles:
      card:
        - background: >-
            [[[ return `center / cover no-repeat
            url(${variables.var_background})`; ]]]
        - background-size: cover
        - border-radius: 10px
        - font-family: >-
            [[[ return `'${variables.var_assistsat_entity_font_style}',
            sans-serif`; ]]]
      custom_fields:
        message:
          - padding: 16px
          - height: 100%
          - overflow-y: auto
          - border-radius: 10px
    custom_fields:
      message:
        card:
          type: vertical-stack
          cards:
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-template-card
                  primary: |-
                    [[[
                      return `${variables.var_display_area_title} ${variables.var_display_area_icon} >`;
                    ]]]
                  secondary: Lights and Scenes
                  tap_action:
                    action: perform-action
                    perform_action: view_assist.navigate
                    data:
                      device: "[[[ return variables.var_assistsat_entity ]]]"
                      path: "[[[ return `${variables.var_dashboard}/areas` ]]]"
                  card_mod:
                    style: |-
                      ha-card {
                        background-color: rgba(0, 0, 0, 0.5) !important;
                        border-radius: 10px;

                      }
                      ha-tile-info {
                        --tile-info-primary-font-size: 2rem !important;
                      }     
            - type: grid
              columns: 2
              square: false
              cards:
                - type: vertical-stack
                  cards:
                    - type: heading
                      heading: Lights
                    - type: grid
                      columns: 1
                      square: false
                      cards: |-
                        [[[
                          const lights = variables.var_lights;
                          if (!Array.isArray(lights) || lights.length === 0) {
                            return [{
                              type: "markdown",
                              content: "No lights setup"
                            }];
                          }

                          return lights.map(light => ({
                            type: "custom:mushroom-light-card",
                            entity: light,
                            use_light_color: true,
                            show_brightness_control: true,
                            show_color_control: true,
                            show_color_temp_control: true,
                            collapsible_controls: true,
                            fill_container: true
                          }));
                        ]]]
                - type: vertical-stack
                  cards:
                    - type: heading
                      heading: Scenes
                    - type: grid
                      columns: 2
                      square: false
                      cards: |-
                        [[[
                          const scenes = variables.var_scenes;
                          if (!Array.isArray(scenes) || scenes.length === 0) {
                            return [{
                              type: "markdown",
                              content: "No scenes setup"
                            }];
                          }

                          return scenes.map(eid => ({
                            type: "tile",
                            entity: eid,
                            vertical: false,
                            hide_state: true,
                            tap_action: {
                              action: "call-service",
                              service: "scene.turn_on",
                              target: { entity_id: eid }
                            },
                            hold_action: {
                              action: "more-info"
                            }
                          }));
                        ]]]
