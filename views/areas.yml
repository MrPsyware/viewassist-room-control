type: panel
title: Areas
path: areas
cards:
  - type: custom:button-card
    template:
      - variable_template
      - body_template
    styles:
      card:
        - background: >-
            [[[ return `center / cover no-repeat url(${variables.background})`
            ]]]
        - background-size: cover
        - border-radius: 0px
        - font-family: >-
            [[[ return `'${variables.var_assistsat_entity_font_style}',
            sans-serif`; ]]]
      custom_fields:
        message:
          - overflow-y: auto
          - font-size: "[[[ return variables.var_font_size ]]]"
          - padding: 10px
          - border-radius: 10px
          - width: 95%
          - text-align: start
          - text-wrap: wrap
          - justify-content: center
          - align-self: center
          - padding: 2%
          - margin: 0.125rem
          - max-height: 100vh
          - height: 100%
    custom_fields:
      message:
        card:
          type: vertical-stack
          cards:
            - type: custom:mushroom-title-card
              title: |
                Areas
            - type: grid
              columns: 2
              square: false
              card_mod:
                style: |
                  #root > * {
                    background: rgba(0,0,0,0.35);
                    border-radius: 12px;
                    padding: 6px;
                  }            
              cards: |-
                [[[
                  const sat = hass.states[variables.var_assistsat_entity];
                  const attrs = sat?.attributes || {};
                  const map = attrs.areas_entity_map || {};

                  if (!map || typeof map !== "object" || Object.keys(map).length === 0) {
                    return [{
                      type: "markdown",
                      content: "No areas found."
                    }];
                  }

                  const titleCase = (s) =>
                    (s ?? "")
                      .toString()
                      .replace(/_/g, " ")
                      .replace(/\b\w/g, c => c.toUpperCase());

                  const emojiForArea = (area) => {
                    const a = (area || "");
                    const match = (k) => k.some(x => a.includes(x));
                    if (match(["office","study","desk"])) return "💼";
                    if (match(["bedroom","master","bed"])) return "🛏️";
                    if (match(["guest"])) return "🛌";
                    if (match(["kitchen"])) return "🍳";
                    if (match(["living","lounge","sofa"])) return "🛋️";
                    if (match(["bath","toilet","wc"])) return "🛁";
                    if (match(["dining"])) return "🍽️";
                    if (match(["hall","hallway","entry"])) return "🚪";
                    if (match(["garage"])) return "🚗";
                    if (match(["garden","outside","yard","patio"])) return "🌿";
                    if (match(["loft","attic"])) return "🧱";
                    if (match(["utility","laundry"])) return "🧺";
                    if (match(["downstairs","upstairs"])) return "🏠";
                    return "🏠";
                  };

                  const uniq = (arr) => [...new Set(arr)];
                  const asArray = (v) => Array.isArray(v) ? v : (typeof v === "string" ? JSON.parse(v) : []);
                  const asNum = (v) => {
                    const n = Number(v);
                    return Number.isFinite(n) ? n : null;
                  };

                  const CO2_WARN = 1200;

                  const areas = Object.keys(map).sort();

                  return areas.map(area => {
                    const rawList = map[area];
                    const entities = uniq(asArray(rawList)).filter(eid => typeof eid === "string" && hass.states[eid]);

                    // Lights status
                    const lights = entities.filter(eid => eid.startsWith("light."));
                    const lightsOn = lights.filter(eid => hass.states[eid].state === "on");
                    const lightsTotal = lights.length;
                    const lightsOnCount = lightsOn.length;

                    // Openings status (door/window/opening device_class)
                    const openingSensors = entities
                      .filter(eid => eid.startsWith("binary_sensor."))
                      .map(eid => hass.states[eid])
                      .filter(st => st && st.state !== "unavailable")
                      .filter(st => ["opening","door","window"].includes(st.attributes?.device_class));

                    const openCount = openingSensors.filter(st => st.state === "on").length;

                    // CO2 status (pick first carbon_dioxide sensor; you can make this "max" later if you want)
                    const co2Sensor = entities
                      .filter(eid => eid.startsWith("sensor."))
                      .map(eid => hass.states[eid])
                      .find(st => st?.attributes?.device_class === "carbon_dioxide");

                    const co2Val = co2Sensor ? asNum(co2Sensor.state) : null;
                    const co2Warn = (co2Val !== null && co2Val >= CO2_WARN);

                    // Colour rules (simple + intuitive)
                    const lightsColor = lightsOnCount > 0 ? "amber" : "grey";

                    // Room chip priority: open windows/doors (red) > high CO2 (orange) > normal (blue)
                    const roomColor = openCount > 0 ? "red" : (co2Warn ? "orange" : "blue");

                    // Chip labels (keep compact)
                    const lightsLabel = lightsTotal > 0 ? `${lightsOnCount}/${lightsTotal}` : "—";
                    const roomLabel = openCount > 0 ? `${openCount}` : (co2Warn ? `CO₂` : "");

                    return {
                      type: "horizontal-stack",
                      cards: [
                        {
                          type: "custom:mushroom-title-card",
                          title: `${titleCase(area)} ${emojiForArea(area)}`,
                          tap_action: { action: "none" },
                          hold_action: { action: "none" },
                          card_mod: { style: `ha-card { padding: 5px; height 0px !important;}` }
                        },
                        {
                          type: "custom:mushroom-chips-card",
                          alignment: "center",
                          chips: [
                            {
                              type: "template",
                              icon: "mdi:lightbulb",
                              icon_color: lightsColor,
                              content: lightsLabel,
                              tap_action: {
                                action: "call-service",
                                service: "view_assist.navigate",
                                data: {
                                  device: variables.var_assistsat_entity,
                                  path: variables.var_dashboard + "/lights?area=" + area
                                }  
                              },
                              hold_action: {
                                action: "call-service",
                                service: "light.turn_off",
                                target: { entity_id: lights }
                              }  
                              
                            },
                            {
                              type: "template",
                              icon: "mdi:home-analytics",
                              icon_color: roomColor,
                              content: roomLabel,
                              tap_action: {
                                action: "call-service",
                                service: "view_assist.navigate",
                                data: {
                                  device: variables.var_assistsat_entity,
                                  path: variables.var_dashboard + "/room?area=" + area
                                }  
                              },
                            }
                          ]
                        }
                      ]
                    };
                  });
                ]]]
