type: panel
title: Areas
path: areas
cards:
  - type: custom:button-card
    template:
      - variable_template
      - body_template
    variables:
      areacardversion: 0.2.0
      var_background: |-
        [[[
          try {
            if (
              hass.states[variables.var_assistsat_entity] &&
              hass.states[variables.var_assistsat_entity].attributes.mode === "night"
            ) return "";
            return hass.states[variables.var_assistsat_entity]
              ? hass.states[variables.var_assistsat_entity].attributes.background
              : "";
          } catch (e) {
            return "";
          }
        ]]]
    styles:
      card:
        - background: >-
            [[[ return `center / cover no-repeat
            url(${variables.var_background})`; ]]]
        - background-size: cover
        - border-radius: 0px
        - font-family: >-
            [[[ return `'${variables.var_assistsat_entity_font_style}',
            sans-serif`; ]]]
      custom_fields:
        message:
          - overflow-y: auto
          - padding: 16px
          - height: 100%
    custom_fields:
      message:
        card:
          type: vertical-stack
          cards:
            - type: grid
              columns: 3
              square: false
              cards:
                - type: custom:mushroom-template-card
                  primary: Areas 🏠
                  secondary: Select a room
                  card_mod:
                    style: |-
                      ha-card {
                        background-color: rgba(0, 0, 0, 0.5) !important;
                        border-radius: 10px;
                      }
                      ha-tile-info {
                        --tile-info-primary-font-size: 2rem !important;
                      }
            - type: grid
              columns: |-
                [[[
                  const vw = window.innerWidth || 0;
                  if (vw >= 1400) return 4;
                  if (vw >= 900) return 3;
                  return 2;
                ]]]
              square: false
              cards: |-
                [[[
                  const sat = hass.states[variables.var_assistsat_entity];
                  const attrs = sat?.attributes || {};
                  const map = attrs.areas_entity_map || {};

                  if (!map || typeof map !== "object" || Object.keys(map).length === 0) {
                    return [{
                      type: "markdown",
                      content: "No areas found."
                    }];
                  }

                  const titleCase = (s) =>
                    (s ?? "")
                      .toString()
                      .replace(/_/g, " ")
                      .replace(/\b\w/g, c => c.toUpperCase());

                  const emojiForArea = (area) => {
                    const a = (area || "").toLowerCase();
                    const match = (k) => k.some(x => a.includes(x));
                    if (match(["office","study","desk"])) return "💼";
                    if (match(["bedroom","master","bed"])) return "🛏️";
                    if (match(["guest"])) return "🛌";
                    if (match(["kitchen"])) return "🍳";
                    if (match(["living","lounge","sofa"])) return "🛋️";
                    if (match(["bath","toilet","wc"])) return "🛁";
                    if (match(["dining"])) return "🍽️";
                    if (match(["hall","hallway","entry"])) return "🚪";
                    if (match(["garage"])) return "🚗";
                    if (match(["garden","outside","yard","patio"])) return "🌿";
                    if (match(["loft","attic"])) return "🧱";
                    if (match(["utility","laundry"])) return "🧺";
                    if (match(["downstairs","upstairs"])) return "🏠";
                    return "🏠";
                  };

                  const uniq = (arr) => [...new Set(arr)];
                  const asArray = (v) =>
                    Array.isArray(v) ? v : (typeof v === "string" ? JSON.parse(v) : []);
                  const asNum = (v) => {
                    const n = Number(v);
                    return Number.isFinite(n) ? n : null;
                  };

                  const CO2_WARN = 1200;
                  const areas = Object.keys(map).sort();

                  return areas.map(area => {
                    const rawList = map[area];
                    const entities = uniq(asArray(rawList))
                      .filter(eid => typeof eid === "string" && hass.states[eid]);

                    const lights = entities.filter(eid => eid.startsWith("light."));
                    const lightsOn = lights.filter(eid => hass.states[eid].state === "on");
                    const lightsTotal = lights.length;
                    const lightsOnCount = lightsOn.length;

                    const openingSensors = entities
                      .filter(eid => eid.startsWith("binary_sensor."))
                      .map(eid => hass.states[eid])
                      .filter(st => st && st.state !== "unavailable")
                      .filter(st => ["opening", "door", "window"].includes(st.attributes?.device_class));

                    const openCount = openingSensors.filter(st => st.state === "on").length;

                    const co2Sensor = entities
                      .filter(eid => eid.startsWith("sensor."))
                      .map(eid => hass.states[eid])
                      .find(st => st?.attributes?.device_class === "carbon_dioxide");

                    const co2Val = co2Sensor ? asNum(co2Sensor.state) : null;
                    const co2Warn = co2Val !== null && co2Val >= CO2_WARN;
                    // Detect occupancy
                    const presenceSensors = entities
                      .filter(eid => eid.startsWith("binary_sensor."))
                      .map(eid => hass.states[eid])
                      .filter(st =>
                        st &&
                        ["motion", "occupancy", "presence"].includes(st.attributes?.device_class)
                      );
                    
                    const occupied = presenceSensors.some(st => st.state === "on");

                    const lightsLabel = lightsTotal > 0 ? `${lightsOnCount}/${lightsTotal}` : "—";

                    let roomStatus = "Room OK";
                    if (openCount > 0) roomStatus = `${openCount} open`;
                    else if (co2Warn) roomStatus = "CO₂ high";
                    // Prepend occupancy indicator
                    if (occupied) roomStatus = `👤 ${roomStatus}`;
                    
                    let roomColor = "blue";
                    if (openCount > 0) roomColor = "red";
                    else if (co2Warn) roomColor = "orange";

                    const lightsColor = lightsOnCount > 0 ? "amber" : "disabled";

                    return {
                      type: "custom:stack-in-card",
                      mode: "horizontal",
                      title: `${titleCase(area)} ${emojiForArea(area)}`,
                      card_mod: { style: `:host .card-header {    font-size: unset;    padding: 0;}` },
                     
                      cards: [
                        {
                          type: "custom:mushroom-template-card",
                          primary: roomStatus,
                          icon: "mdi:home-analytics",
                          icon_color: roomColor,
                          multiline_secondary: false,
                          fill_container: true,
                          layout: "vertical",

                          tap_action: {
                            action: "perform-action",
                            perform_action: "view_assist.navigate",
                            data: {
                              device: variables.var_assistsat_entity,
                              path: variables.var_dashboard + "/room?area=" + area
                            }
                          },
                          hold_action: {
                            action: "none"
                          }
                        },
                        {
                          type: "custom:mushroom-template-card",
                          icon: "mdi:lightbulb",
                          icon_color: lightsColor,
                          primary: lightsLabel + " Lights",
                          
                          layout: "vertical",
                          tap_action: {
                            action: "perform-action",
                            perform_action: "view_assist.navigate",
                            data: {
                              device: variables.var_assistsat_entity,
                              path: variables.var_dashboard + "/lights?area=" + area
                            }
                          },
                          hold_action: {
                            action: "none"
                          }
                        }
                      ]
                    };
                  });
                ]]]
